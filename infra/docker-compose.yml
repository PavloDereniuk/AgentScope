services:
  postgres:
    image: postgres:16-alpine
    container_name: agentscope-postgres
    environment:
      POSTGRES_USER: agentscope
      POSTGRES_PASSWORD: agentscope_dev
      POSTGRES_DB: agentscope
    ports:
      - "5432:5432"
    volumes:
      - agentscope_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentscope"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  agentscope_pg:
