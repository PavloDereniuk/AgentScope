name: Keep Railway alive

on:
  schedule:
    # Every 3 days at 10:00 UTC — well within Railway's 7-day inactivity threshold
    - cron: '0 10 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping API health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.agentscopehq.dev/health)
          echo "HTTP $STATUS"
          [ "$STATUS" = "200" ] || exit 1
